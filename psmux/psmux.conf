# Window/pane numbering starts at 1
set -g base-index 1
set -g pane-base-index 1

# Use pwsh as the default shell so PSReadLine and profile load in every pane
set -g default-shell "pwsh"

# New windows/panes open in the current working directory
bind-key -T prefix c new-window -c "#{pane_current_path}"
bind-key -T prefix s split-window -v -c "#{pane_current_path}"
bind-key -T prefix v split-window -h -c "#{pane_current_path}"
bind-key -T prefix j select-pane -D
bind-key -T prefix k select-pane -U
bind-key -T prefix h select-pane -L
bind-key -T prefix l select-pane -R

# C-Backspace and C-H are swapped in psmux
bind-key -n C-Backspace send-keys C-H

# prefix+f: open psmux-sessionizer in a new window (mirrors tmux `bind-key -r f`)
bind-key -T prefix f new-window "pwsh -NoLogo -NoProfile $env:USERPROFILE/Documents/PowerShell/psmux-sessionizer.ps1"

# Allow the shell to report its CWD via OSC 7 escape sequences so that
# #{pane_current_path} stays accurate even when a child process changes
# directory without psmux being able to poll /proc (Windows has no /proc).
set -g allow-passthrough on

# Enable PSReadLine inline predictions (auto-suggestions) inside psmux panes.
# Without this, psmux swallows the VT sequences PSReadLine uses to render
# predictive text, so completions appear broken.
set -g allow-predictions on
set -g prediction-dimming off

# Scrollback history
set -g history-limit 5000

# claude
set -s extended-keys on
set -s focus-events on

# =============================================================================
# psmux-theme-gruvbox - Gruvbox Dark
# Style: Flat Block
# Active tab: solid colored block, no arrows. Inactive: subtle bg blocks.
# =============================================================================
#
# Palette:
#   bg=#282828 bg1=#3c3836 bg2=#504945 bg3=#665c54
#   fg=#ebdbb2 gray=#928374
#   red=#fb4934 green=#b8bb26 yellow=#fabd2f blue=#83a598
#   purple=#d3869b aqua=#8ec07c orange=#fe8019

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#282828,fg=#ebdbb2"

set -g status-left "#[bg=#fabd2f,fg=#282828,bold] #S #[fg=#fabd2f,bg=#3c3836]▌#[fg=#d5c4a1] #{user} #[fg=#3c3836,bg=#282828]▌ "
set -g status-left-length 50

set -g status-right "#{?client_prefix,#[bg=#fe8019,fg=#282828,bold] PREF #[fg=#fe8019,bg=#282828]▌ ,}#[fg=#504945,bg=#282828]▐#[bg=#504945,fg=#8ec07c] %H:%M #[fg=#665c54,bg=#504945]▐#[bg=#665c54,fg=#83a598] %a #[fg=#fabd2f,bg=#665c54]▐#[bg=#fabd2f,fg=#282828,bold] %d-%b "
set -g status-right-length 80

# Inactive: subtle bg blocks with 1-char gap
set -g window-status-format "#[bg=#282828] #[bg=#3c3836,fg=#928374] #I #W#{?window_flags, #{window_flags},} "
set -g window-status-separator ""

# Active: flat colored block, NO arrows
set -g window-status-current-format "#[bg=#282828] #[bg=#b8bb26,fg=#282828,bold] #I #W#{?window_flags, #{window_flags},} "

set -g window-status-activity-style "fg=#fe8019,bg=#3c3836"
set -g pane-active-border-style "fg=#8ec07c"
set -g pane-border-style "fg=#3c3836"
set -g message-style "bg=#504945,fg=#ebdbb2"
set -g message-command-style "bg=#504945,fg=#ebdbb2"
# set -g mode-style "bg=#fabd2f,fg=#282828"# Optional: customize before loading
