# Copy to /etc/systemd/resolved.conf.d/99-fallback-dns.conf 
[Resolve]
# These will be used only when no other DNS servers (from NetworkManager, DHCP, or WARP) are available
FallbackDNS=9.9.9.9 149.112.112.112 2620:fe::fe 2620:fe::9 94.140.14.14 94.140.15.15 1.1.1.1 1.0.0.1 2606:4700:4700::1111 2606:4700:4700::1001 8.8.8.8 8.8.4.4 2001:4860:4860::8888 2001:4860:4860::8844

# Optional: Also set primary global DNS (higher priority than fallback)
DNS=1.1.1.1 1.0.0.1

# Recommended extra settings with WARP
DNSOverTLS=opportunistic
DNSSEC=allow-downgrade
Domains=~.
